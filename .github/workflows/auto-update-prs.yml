name: Auto-rebase PR branches

on:
  push:
    branches: [main]

# Prevent concurrent runs — each merge to main triggers this,
# so we need to queue them to avoid race conditions
concurrency:
  group: auto-rebase
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto-rebase open PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // --- Named constants ---
            const REBASE_BRANCH_PREFIX = '_rebase_';
            const MERGE_BRANCH_PREFIX = '_merge_';
            const CONFLICT_COMMENT_MARKER = 'Rebase Conflict';
            const RECENT_COMMENTS_LIMIT = 5;

            // --- Helper functions ---

            /** Run a shell command, returning stdout as a trimmed string. */
            function git(cmd) {
              return execSync(cmd, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }).trim();
            }

            /** Run a shell command silently (no output needed). */
            function gitSilent(cmd) {
              execSync(cmd, { stdio: 'pipe' });
            }

            /** Fetch a branch from origin and check out a local working branch. */
            function fetchAndCheckout(branch, localName) {
              gitSilent(`git fetch origin ${branch}`);
              gitSilent(`git checkout -B ${localName} origin/${branch}`);
            }

            /** Force-push a local branch to overwrite the remote PR branch. */
            function pushToRemote(localName, remoteBranch) {
              gitSilent(`git push origin ${localName}:${remoteBranch} --force-with-lease`);
            }

            /**
             * Safely abort an in-progress rebase or merge.
             * Failures are expected if there is nothing to abort.
             */
            function safeAbort(command) {
              try {
                gitSilent(command);
              } catch (err) {
                console.log(`  Note: ${command} had nothing to abort (${err.message})`);
              }
            }

            /** Return to the main branch so the next PR starts from a clean state. */
            function returnToMain() {
              try {
                gitSilent('git checkout main');
              } catch (err) {
                console.error(`  Warning: could not return to main: ${err.message}`);
              }
            }

            // --- Main logic ---

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              sort: 'created',
              direction: 'asc'
            });

            if (prs.length === 0) {
              console.log('No open PRs to rebase');
              return;
            }

            // Refresh main
            gitSilent('git fetch origin main');
            gitSilent('git checkout main');
            gitSilent('git reset --hard origin/main');

            for (const pr of prs) {
              const branch = pr.head.ref;
              console.log(`\nProcessing PR #${pr.number}: ${pr.title} (${branch})`);

              try {
                // Fetch the PR branch
                gitSilent(`git fetch origin ${branch}`);

                // Check if already up to date
                const mergeBase = git(`git merge-base origin/main origin/${branch}`);
                const mainHead = git('git rev-parse origin/main');
                if (mergeBase === mainHead) {
                  console.log(`  Already up to date`);
                  continue;
                }

                // Try rebase first
                await tryRebaseOrMerge(pr, branch);
              } catch (err) {
                console.error(`  Unexpected error processing PR #${pr.number}: ${err.message}`);
              }

              returnToMain();
            }

            /**
             * Attempt to rebase the PR branch onto main.
             * If rebase fails due to conflicts, fall back to a merge.
             * If both fail, post a conflict comment on the PR.
             */
            async function tryRebaseOrMerge(pr, branch) {
              try {
                fetchAndCheckout(branch, `${REBASE_BRANCH_PREFIX}${pr.number}`);
                gitSilent('git rebase origin/main');
                pushToRemote(`${REBASE_BRANCH_PREFIX}${pr.number}`, branch);
                console.log(`  Rebased successfully`);
              } catch (rebaseErr) {
                console.log(`  Rebase failed: ${rebaseErr.message}`);
                safeAbort('git rebase --abort');
                await tryMergeOrComment(pr, branch);
              }
            }

            /**
             * Fall back to merging main into the PR branch.
             * If merge also fails, notify the author via a PR comment.
             */
            async function tryMergeOrComment(pr, branch) {
              try {
                fetchAndCheckout(branch, `${MERGE_BRANCH_PREFIX}${pr.number}`);
                gitSilent('git merge origin/main --no-edit');
                pushToRemote(`${MERGE_BRANCH_PREFIX}${pr.number}`, branch);
                console.log(`  Merged main into branch (rebase had conflicts)`);
              } catch (mergeErr) {
                console.error(`  Merge also failed: ${mergeErr.message}`);
                safeAbort('git merge --abort');
                await notifyConflict(pr);
              }
            }

            /** Post a conflict comment on the PR if one hasn't been posted already. */
            async function notifyConflict(pr) {
              console.log(`  PR #${pr.number} has unresolvable conflicts`);

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: RECENT_COMMENTS_LIMIT
              });
              const alreadyNotified = comments.some(c => c.body?.includes(CONFLICT_COMMENT_MARKER));

              if (!alreadyNotified) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `## ${CONFLICT_COMMENT_MARKER}\n\nThis PR has conflicts with \`main\` that could not be auto-resolved.\n\nPlease rebase manually:\n\`\`\`bash\ngit fetch origin main\ngit rebase origin/main\n# resolve conflicts\ngit push --force-with-lease\n\`\`\`\n\nIf the conflict persists, this PR may be auto-closed.`
                });
              }
            }
