name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Reject manual manifest edits
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^manifest\.json$'; then
            echo "::error::manifest.json is auto-generated by CI. Remove it from your PR."
            exit 1
          fi

      - name: Run schema validation
        run: python scripts/validate.py

      - name: Run secret scan
        run: python scripts/check_secrets.py nerves/ adapters/ connectors/

